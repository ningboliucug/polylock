version: '3.8'

services:
  # 1. 真实的 IPFS 节点 (模拟 Ground Station/边缘云)
  ipfs-node:
    image: ipfs/kubo:latest   # 【修复点 1】更新为 kubo
    container_name: ipfs-gs
    ports:
      - "4001:4001"
      - "5001:5001" # API port
      - "8080:8080" # Gateway port
    volumes:
      - ./ipfs-data:/data/ipfs
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G

  # 2. 卫星节点 (Data Owner)
  satellite:
    build: ./satellite
    container_name: sat-node
    depends_on:
      - ipfs-node
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # 【新增 1】：绑核！强制它只能在第 0 到第 9 个物理核心上运行，绝对禁止跨 NUMA 节点漂移
    cpuset: "0-9" 
    environment:
      - IPFS_API=ipfs-node:5001
      - PARAM_M=60000 
      - PARAM_SIGMA=0.49
      # 【新增 2】：告诉 Go 调度器，你只有 10 个核，不要瞎开多余的线程
      - GOMAXPROCS=10
    cap_add:
      - NET_ADMIN
    volumes:
      - ./shared-data:/tmp/shared  # 【新增】共享卷，用于传递 CID
    # 【修复点 2】去掉带 # 的中文注释
    command: >
      sh -c "
      tc qdisc add dev eth0 root netem delay 20ms rate 1000mbit &&
      echo 'Network limits applied (20ms, 1000Mbps)' &&
      ./sat_app
      "

  # 3. 终端节点 (User)
  terminal:
    build: ./terminal
    container_name: term-node
    depends_on:
      - ipfs-node
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    environment:
      - IPFS_API=ipfs-node:5001
      - PARAM_M=60000
    cap_add:
      - NET_ADMIN
    volumes:
      - ./shared-data:/tmp/shared  # 【新增】共享卷，接收 CID
    command: >
      sh -c "
      tc qdisc add dev eth0 root netem delay 20ms rate 500mbit &&
      tc qdisc add dev eth0 handle ffff: ingress &&
      tc filter add dev eth0 parent ffff: protocol ip u32 match u32 0 0 police rate 500mbit burst 2000k drop flowid :1 &&
      echo 'Network limits applied: Egress (Netem) & Ingress (Police) at 500Mbps' &&
      sleep 5 &&
      ./term_app
      "
